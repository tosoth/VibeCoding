<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Teleprompter (Local Sync)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            transition: background-color 0.3s ease; 
        }
        #scroll-container { 
            height: 100vh; 
            overflow-y: auto; 
            scrollbar-width: none; 
            -ms-overflow-style: none; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        #scroll-container::-webkit-scrollbar { 
            display: none; 
        }
        #content-area { 
            min-height: 101vh; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            outline: none; 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding-bottom: 70vh; 
            padding-top: 100px; 
        }
        .toolbar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            z-index: 100; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(5px); 
            border-bottom: 1px solid #ddd; 
            display: flex; 
            align-items: center; 
            padding: 8px 16px; 
            gap: 12px; 
            transition: transform 0.3s ease; 
        }
        .toolbar.hidden { 
            transform: translateY(-100%); 
        }
        .control-group { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            border-right: 1px solid #ccc; 
            padding-right: 12px; 
        }
        label { 
            font-size: 11px; 
            font-weight: 700; 
            color: #666; 
            text-transform: uppercase; 
        }
        select, input[type="color"], input[type="number"] { 
            padding: 4px; 
            border-radius: 4px; 
            border: 1px solid #ccc; 
            font-size: 13px; 
        }
        .status-indicator { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            padding: 8px 16px; 
            border-radius: 20px; 
            background: rgba(0,0,0,0.6); 
            color: white; 
            font-size: 12px; 
            pointer-events: none; 
            opacity: 0.8; 
            z-index: 1000; 
        }
    </style>
</head>
<body id="main-body" class="bg-white">

    <div id="toolbar" class="toolbar">
        <div class="control-group">
            <label>Font</label>
            <select id="font-family">
                <option value="sans-serif">Sans Serif</option>
                <option value="serif">Serif</option>
                <option value="monospace">Monospace</option>
            </select>
        </div>

        <div class="control-group">
            <label>Size</label>
            <input type="number" id="font-size-input" value="48" min="10" max="200" style="width: 60px;">
        </div>

        <div class="control-group">
            <label>Color</label>
            <input type="color" id="font-color" value="#000000">
        </div>

        <div class="control-group">
            <label>BG</label>
            <input type="color" id="bg-color" value="#ffffff">
        </div>

        <div class="text-[10px] text-gray-500 uppercase font-bold tracking-tight">
            ENT: Play/Stop | TAB: Full | +/-: Resize
        </div>
    </div>

    <div id="scroll-container">
        <div id="content-area" contenteditable="true" spellcheck="false">
Welcome. Paste your text here.
Settings and scroll position are now saved locally in your browser.
        </div>
    </div>

    <div id="status" class="status-indicator">Stopped</div>

    <script>
        // DOM Elements
        const container = document.getElementById('scroll-container');
        const content = document.getElementById('content-area');
        const body = document.getElementById('main-body');
        const toolbar = document.getElementById('toolbar');
        const status = document.getElementById('status');
        
        const fontFamilySelect = document.getElementById('font-family');
        const fontSizeInput = document.getElementById('font-size-input');
        const fontColorInput = document.getElementById('font-color');
        const bgColorInput = document.getElementById('bg-color');

        let isScrolling = false;
        let lastMouseY = 0;
        let animationFrame;
        const STORAGE_KEY = 'teleprompter_local_settings';

        /**
         * Scroll Sensitivity Configuration
         * Browsers typically run at 60fps. 
         * To achieve ~1px every 0.99s:
         * 1 / 0.99 = 1.01 pixels per second.
         * 1.01 / 60 = 0.0168 pixels per frame.
         */
        const MIN_SPEED = 0.0168; // ~1px every 0.99 seconds
        const MAX_SPEED = 2.0;    // Reduced max speed for finer control overall

        // Used to track sub-pixel movements since scrollTop only accepts integers
        let decimalAccumulator = 0;

        // --- LOCAL STORAGE OPERATIONS ---
        function saveData() {
            const settings = {
                text: content.innerText,
                fontFamily: fontFamilySelect.value,
                fontSize: fontSizeInput.value,
                fontColor: fontColorInput.value,
                bgColor: bgColorInput.value,
                scrollPos: container.scrollTop,
                updatedAt: Date.now()
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                content.innerText = data.text || content.innerText;
                fontFamilySelect.value = data.fontFamily || "sans-serif";
                fontSizeInput.value = data.fontSize || "48";
                fontColorInput.value = data.fontColor || "#000000";
                bgColorInput.value = data.bgColor || "#ffffff";
                
                applyStyles(false); 

                setTimeout(() => {
                    container.scrollTop = data.scrollPos || 0;
                }, 50);
            }
        }

        // --- TELEPROMPTER LOGIC ---
        function applyStyles(shouldSave = true) {
            content.style.fontFamily = fontFamilySelect.value;
            content.style.fontSize = fontSizeInput.value + 'px';
            content.style.color = fontColorInput.value;
            body.style.backgroundColor = bgColorInput.value;
            if (shouldSave) saveData();
        }

        function scrollLoop() {
            if (!isScrolling) return;
            const windowHeight = window.innerHeight;
            
            // Calculate ratio (0 at top, 1 at bottom)
            const ratio = lastMouseY / windowHeight;
            
            // Linear speed calculation
            const scrollSpeed = MIN_SPEED + (ratio * (MAX_SPEED - MIN_SPEED));
            
            // Accumulate decimal values to handle sub-pixel speeds correctly
            decimalAccumulator += scrollSpeed;
            
            if (decimalAccumulator >= 1) {
                const pixelsToScroll = Math.floor(decimalAccumulator);
                container.scrollTop += pixelsToScroll;
                decimalAccumulator -= pixelsToScroll;
            }

            if (container.scrollTop + container.clientHeight >= container.scrollHeight) {
                stopScrolling();
            } else {
                animationFrame = requestAnimationFrame(scrollLoop);
            }
        }

        function startScrolling() {
            if (isScrolling) return;
            isScrolling = true;
            decimalAccumulator = 0; 
            status.innerText = "Scrolling";
            status.style.background = "rgba(34, 197, 94, 0.8)";
            scrollLoop();
        }

        function stopScrolling() {
            isScrolling = false;
            cancelAnimationFrame(animationFrame);
            status.innerText = "Stopped";
            status.style.background = "rgba(0, 0, 0, 0.6)";
            saveData(); 
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.error(e));
                toolbar.classList.add('hidden');
            } else {
                document.exitFullscreen();
                toolbar.classList.remove('hidden');
            }
        }

        // --- EVENT LISTENERS ---
        window.addEventListener('mousemove', (e) => { lastMouseY = e.clientY; });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                toggleFullscreen();
            }
            if (e.key === 'Enter') {
                if (document.activeElement !== content) {
                    isScrolling ? stopScrolling() : startScrolling();
                } else if (e.ctrlKey) {
                    isScrolling ? stopScrolling() : startScrolling();
                    content.blur();
                }
            }
            if (e.key === '+' || e.key === '=') {
                fontSizeInput.value = parseInt(fontSizeInput.value) + 2;
                applyStyles();
            }
            if (e.key === '-' || e.key === '_') {
                fontSizeInput.value = Math.max(10, parseInt(fontSizeInput.value) - 2);
                applyStyles();
            }
        });

        let debounceTimer;
        content.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(saveData, 1000);
        });

        fontFamilySelect.addEventListener('change', () => applyStyles());
        fontSizeInput.addEventListener('input', () => applyStyles());
        fontColorInput.addEventListener('input', () => applyStyles());
        bgColorInput.addEventListener('input', () => applyStyles());

        container.addEventListener('scroll', () => {
            if (!isScrolling) {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(saveData, 500);
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) toolbar.classList.remove('hidden');
        });

        window.onload = loadData;

    </script>
</body>
</html>
