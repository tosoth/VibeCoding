<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to EPUB Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            width: 100%;
            min-height: 400px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            transition: border-color 0.3s;
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .convert-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .convert-btn:active {
            transform: translateY(0);
        }

        .clear-btn {
            background: #f5f5f5;
            color: #666;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .char-count {
            text-align: right;
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Text to EPUB Converter</h1>
        <p class="subtitle">Convert your text into an EPUB ebook file instantly</p>

        <div class="input-group">
            <label for="bookTitle">Book Title</label>
            <input type="text" id="bookTitle" placeholder="Enter your book title..." value="My Book">
        </div>

        <div class="input-group">
            <label for="author">Author Name</label>
            <input type="text" id="author" placeholder="Enter author name..." value="Anonymous">
        </div>

        <div class="input-group">
            <label for="textInput">Your Text</label>
            <textarea id="textInput" placeholder="Paste or type your text here..."></textarea>
            <div class="char-count" id="charCount">0 characters</div>
        </div>

        <div class="button-group">
            <button class="convert-btn" onclick="convertToEpub()">Convert to EPUB</button>
            <button class="clear-btn" onclick="clearForm()">Clear</button>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');

        // Update character count
        textInput.addEventListener('input', () => {
            const count = textInput.value.length;
            charCount.textContent = `${count.toLocaleString()} characters`;
        });

        function showStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + (isError ? 'error' : 'success');
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 5000);
        }

        function clearForm() {
            textInput.value = '';
            charCount.textContent = '0 characters';
        }

        async function convertToEpub() {
            const text = document.getElementById('textInput').value.trim();
            const title = document.getElementById('bookTitle').value.trim() || 'My Book';
            const author = document.getElementById('author').value.trim() || 'Anonymous';

            if (!text) {
                showStatus('Please enter some text to convert!', true);
                return;
            }

            try {
                const zip = new JSZip();

                // Add mimetype (must be first, uncompressed)
                zip.file('mimetype', 'application/epub+zip', { compression: 'STORE' });

                // META-INF/container.xml
                const containerXml = `<?xml version="1.0" encoding="UTF-8"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
    <rootfiles>
        <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
    </rootfiles>
</container>`;
                zip.folder('META-INF').file('container.xml', containerXml);

                // OEBPS/content.opf
                const contentOpf = `<?xml version="1.0" encoding="UTF-8"?>
<package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="bookid">
    <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
        <dc:title>${escapeXml(title)}</dc:title>
        <dc:creator>${escapeXml(author)}</dc:creator>
        <dc:language>en</dc:language>
        <dc:identifier id="bookid">urn:uuid:${generateUUID()}</dc:identifier>
        <meta property="dcterms:modified">${new Date().toISOString().split('.')[0]}Z</meta>
    </metadata>
    <manifest>
        <item id="content" href="content.xhtml" media-type="application/xhtml+xml"/>
        <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>
    </manifest>
    <spine toc="ncx">
        <itemref idref="content"/>
    </spine>
</package>`;
                zip.folder('OEBPS').file('content.opf', contentOpf);

                // OEBPS/toc.ncx
                const tocNcx = `<?xml version="1.0" encoding="UTF-8"?>
<ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
    <head>
        <meta name="dtb:uid" content="urn:uuid:${generateUUID()}"/>
        <meta name="dtb:depth" content="1"/>
        <meta name="dtb:totalPageCount" content="0"/>
        <meta name="dtb:maxPageNumber" content="0"/>
    </head>
    <docTitle>
        <text>${escapeXml(title)}</text>
    </docTitle>
    <navMap>
        <navPoint id="content">
            <navLabel>
                <text>Content</text>
            </navLabel>
            <content src="content.xhtml"/>
        </navPoint>
    </navMap>
</ncx>`;
                zip.folder('OEBPS').file('toc.ncx', tocNcx);

                // OEBPS/content.xhtml
                const contentXhtml = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops">
<head>
    <title>${escapeXml(title)}</title>
    <style>
        body {
            font-family: serif;
            line-height: 1.6;
            margin: 2em;
        }
        p {
            text-indent: 1.5em;
            margin: 0.5em 0;
        }
        p:first-of-type {
            text-indent: 0;
        }
    </style>
</head>
<body>
    <h1>${escapeXml(title)}</h1>
    <p><em>by ${escapeXml(author)}</em></p>
    ${formatTextAsHtml(text)}
</body>
</html>`;
                zip.folder('OEBPS').file('content.xhtml', contentXhtml);

                // Generate EPUB
                const blob = await zip.generateAsync({ type: 'blob' });
                
                // Download
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${sanitizeFilename(title)}.epub`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showStatus('✓ EPUB file created successfully!');
            } catch (error) {
                console.error('Error creating EPUB:', error);
                showStatus('Error creating EPUB file. Please try again.', true);
            }
        }

        function escapeXml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&apos;');
        }

        function formatTextAsHtml(text) {
            // Split by double line breaks for paragraphs
            const paragraphs = text.split(/\n\s*\n/);
            return paragraphs
                .map(p => p.trim())
                .filter(p => p.length > 0)
                .map(p => `    <p>${escapeXml(p)}</p>`)
                .join('\n');
        }

        function sanitizeFilename(filename) {
            return filename.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
    </script>
</body>
</html>
